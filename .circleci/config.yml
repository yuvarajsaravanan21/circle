version: 2.1

jobs:
  build-and-push:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout

      # 🔥 Enable Docker in CircleCI
      - setup_remote_docker

      # 🐳 Login to DockerHub
      - run:
          name: Login to DockerHub
          command: echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin

      # 🏗️ Build Docker image
      - run:
          name: Build Docker Image
          command: docker build -t $DOCKER_USER/demo-app .

      # 🚀 Push Docker image
      - run:
          name: Push Docker Image
          command: docker push $DOCKER_USER/demo-app

workflows:
  version: 2
  build_and_push_workflow:
    jobs:
      - build-and-push